name = "changpt-cms-auth"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Provisions cms-auth.changpt.org (DNS record + cert) on `wrangler deploy`.
# The zone changpt.org must be in the same Cloudflare account you log into.
[[routes]]
pattern = "cms-auth.changpt.org"
custom_domain = true

# Set the two secrets (NOT stored in this file):
#   npx wrangler secret put GITHUB_CLIENT_ID
#   npx wrangler secret put GITHUB_CLIENT_SECRET
